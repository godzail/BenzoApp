# =============================================================================
# Claude Code — Hook Rules Configuration
# =============================================================================
# Consumed by:
#   .claude/hooks/pre-bash-check.py       → [[bash_rules]]
#   .claude/hooks/file-rules-reminder.py  → [[file_rules]]
# =============================================================================

# -----------------------------------------------------------------------------
# [[file_rules]]
#
# Inject a reminder message when Claude writes/edits a file matching a path
# pattern. Useful for pointing Claude to project-specific instruction files.
#
# Fields:
#   id               - unique identifier
#   description      - human-readable label (comments/logs only)
#   tools            - Claude Code tools that trigger this rule
#                      allowed: Write, Edit, MultiEdit, NotebookEdit
#   file_pattern     - regex matched against the target file path
#   once_per_session - (default: true) fire only on the first match per
#                      project/session; false = fire on every matching call
#   message          - text sent to Claude as feedback (exit 2)
# -----------------------------------------------------------------------------

[[file_rules]]
id = "python-instructions"
description = "Remind Claude to follow Python coding instructions"
tools = ["Write", "Edit", "MultiEdit", "NotebookEdit"]
file_pattern = '\.py$'
once_per_session = false
message = """
[HOOK] Python file detected — follow project instructions first.

Read and apply: docs/agents/py.instructions.md

Then proceed with the requested operation.
"""

