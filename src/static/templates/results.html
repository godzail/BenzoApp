<div id="results" aria-live="polite">
  <!-- Skeleton loader -->
  <div id="skeleton-loader" class="hidden flex flex-col gap-4">
    <div class="skeleton-card bg-[var(--bg-surface)] border border-[var(--border-color)] rounded-xl p-6">
      <div class="skeleton-header flex items-center gap-4 mb-4">
        <div class="skeleton-avatar w-10 h-10 rounded-lg animate-shimmer"></div>
        <div class="skeleton-title flex-1 h-4 rounded animate-shimmer"></div>
      </div>
      <div class="skeleton-body">
        <div class="h-3 rounded animate-shimmer mb-2"></div>
        <div class="h-3 rounded animate-shimmer w-3/5"></div>
      </div>
    </div>
    <div class="skeleton-card bg-[var(--bg-surface)] border border-[var(--border-color)] rounded-xl p-6">
      <div class="skeleton-header flex items-center gap-4 mb-4">
        <div class="skeleton-avatar w-10 h-10 rounded-lg animate-shimmer"></div>
        <div class="skeleton-title flex-1 h-4 rounded animate-shimmer"></div>
      </div>
      <div class="skeleton-body">
        <div class="h-3 rounded animate-shimmer mb-2"></div>
        <div class="h-3 rounded animate-shimmer w-3/5"></div>
      </div>
    </div>
    <div class="skeleton-card bg-[var(--bg-surface)] border border-[var(--border-color)] rounded-xl p-6">
      <div class="skeleton-header flex items-center gap-4 mb-4">
        <div class="skeleton-avatar w-10 h-10 rounded-lg animate-shimmer"></div>
        <div class="skeleton-title flex-1 h-4 rounded animate-shimmer"></div>
      </div>
      <div class="skeleton-body">
        <div class="h-3 rounded animate-shimmer mb-2"></div>
        <div class="h-3 rounded animate-shimmer w-3/5"></div>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div
    id="empty-state"
    class="hidden text-center p-8 bg-[var(--bg-surface)] border border-[var(--border-color)] rounded-xl"
  >
    <div class="empty-icon text-6xl text-[var(--border-color)] mb-6">
      <svg
        aria-hidden="true"
        width="64"
        height="64"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
        <line x1="8" y1="8" x2="14" y2="14"></line>
        <line x1="14" y1="8" x2="8" y2="14"></line>
      </svg>
    </div>
    <p class="empty-message text-lg text-[var(--text-primary)] mb-2" id="no-results-i18n" data-i18n="no_results"></p>
    <p class="empty-suggestion text-base text-[var(--text-muted)]">Try adjusting your search radius or fuel type</p>
  </div>

  <!-- Results -->
  <section id="results-section" class="hidden" aria-labelledby="results-heading">
    <h2 id="results-heading" class="sr-only" data-i18n="results_heading"></h2>
    <!-- Include translateFuel reference for template-level checks (hidden) -->
    <span class="sr-only" id="translateFuel-sample">translateFuel('benzina')</span>
    <div id="stations-list" class="flex flex-col gap-2"></div>
  </section>

  <!-- Error Message -->
  <div
    id="error-message"
    class="hidden flex items-center bg-red-500/10 text-red-500 p-4 rounded-xl border border-red-500/20 mt-4 font-medium"
    role="alert"
  >
    <svg
      aria-hidden="true"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      class="mr-2"
    >
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    <span id="error-text"></span>
  </div>
</div>
