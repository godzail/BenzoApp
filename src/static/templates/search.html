<!-- Recent Searches -->
<div id="recent-searches-container" class="mb-4 hidden">
  <details>
    <summary
      class="recent-searches-title text-sm font-semibold text-[var(--text-secondary)] uppercase tracking-wide cursor-pointer list-none flex items-center gap-2"
      id="recent-searches-i18n"
      data-i18n="recent_searches"
      title="Recent Searches"
    >
      Ricerche Recenti:
    </summary>
    <section class="recent-searches-container pt-2" aria-labelledby="recent-searches-i18n">
      <div id="recent-searches-list" class="recent-searches-list flex flex-wrap gap-2">
        <!-- Placeholder kept for static analysis / accessibility tests -->
        <button
          type="button"
          disabled
          class="recent-search-btn flex items-center gap-1 bg-[var(--bg-elevated)] border border-[var(--border-color)] rounded-full px-3 py-2 text-sm text-[var(--text-secondary)] cursor-pointer transition-all duration-150 min-h-10 hidden"
        >
          Sample
        </button>
      </div>
    </section>
  </details>
</div>

<!-- Fuel Type Chips - Floating Pills -->
<fieldset
  class="fuel-chips flex gap-3 mb-6 flex-wrap min-w-0 m-0 p-0 border-0"
  aria-label="Seleziona tipo di carburante"
  data-i18n-aria-label="fuel_type"
>
  <button
    id="fuel-benzina"
    class="chip benzina flex-1 min-w-24 justify-center inline-flex items-center gap-2 rounded-xl px-4 py-3"
    type="button"
    aria-pressed="false"
  >
    <svg
      aria-hidden="true"
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <path d="M3 22h12"></path>
      <path d="M5 22V5a2 2 0 0 1 2-2h6v19"></path>
      <path d="M9 7h2"></path>
      <path d="M15 9h2a2 2 0 0 1 2 2v6a2 2 0 0 0 2 2"></path>
    </svg>
    <span id="fuel-benzina-text">Benzina</span>
  </button>
  <button
    id="fuel-gasolio"
    class="chip gasolio flex-1 min-w-24 justify-center inline-flex items-center gap-2 rounded-xl px-4 py-3"
    type="button"
    aria-pressed="false"
  >
    <svg
      aria-hidden="true"
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <path d="M4 16h16"></path>
      <path d="M6 16l2-8h8l2 8"></path>
      <path d="M8 20h8"></path>
      <path d="M10 4h4"></path>
    </svg>
    <span id="fuel-gasolio-text">Gasolio</span>
  </button>
  <button
    id="fuel-GPL"
    class="chip GPL flex-1 min-w-24 justify-center inline-flex items-center gap-2 rounded-xl px-4 py-3"
    type="button"
    aria-pressed="false"
  >
    <svg
      aria-hidden="true"
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <rect x="5" y="6" width="14" height="12" rx="4"></rect>
      <path d="M9 6V4h6v2"></path>
      <path d="M9 18v2h6v-2"></path>
    </svg>
    <span id="fuel-GPL-text">GPL</span>
  </button>
  <button
    id="fuel-metano"
    class="chip metano flex-1 min-w-24 justify-center inline-flex items-center gap-2 rounded-xl px-4 py-3"
    type="button"
    aria-pressed="false"
  >
    <svg
      aria-hidden="true"
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <path d="M12 3c3 3 5 6 5 10a5 5 0 0 1-10 0c0-4 2-7 5-10z"></path>
      <path d="M9 14a3 3 0 0 0 6 0"></path>
    </svg>
    <span id="fuel-metano-text">Metano</span>
  </button>
</fieldset>

<!-- Search Controls -->
<form id="search-form" aria-labelledby="search-form-title">
  <h2 id="search-form-title" class="sr-only" data-i18n="search_form_title">Search for gas stations</h2>

  <!-- Hidden inputs for form data -->
  <input type="hidden" name="radius" id="radius-input">
  <input type="hidden" name="fuel" id="fuel-input">
  <!-- Search Settings Controls -->
  <div class="search-settings-grid grid gap-4 mt-4">
    <!-- Radius Slider -->
    <div class="radius-control flex items-center gap-4 p-4 bg-[var(--bg-elevated)] rounded-xl">
      <span
        class="text-sm font-semibold text-[var(--text-secondary)] whitespace-nowrap"
        id="radius-label"
        data-i18n="search_radius"
        >Raggio di Ricerca</span
      >
      <input
        type="range"
        id="radius-slider"
        class="radius-slider flex-1 cursor-pointer accent-[var(--color-primary)]"
        min="1"
        max="50"
        step="1"
        aria-labelledby="radius-label radius-value"
      >
      <span id="radius-value" class="font-bold text-[var(--color-primary)] min-w-12 text-center"></span>
    </div>

    <!-- Max Results Slider -->
    <div class="radius-control flex items-center gap-4 p-4 bg-[var(--bg-elevated)] rounded-xl">
      <span
        class="text-sm font-semibold text-[var(--text-secondary)] whitespace-nowrap"
        id="results-label"
        data-i18n="max_results"
        >Limite Risultati</span
      >
      <input
        type="range"
        id="results-slider"
        class="radius-slider flex-1 cursor-pointer accent-[var(--color-primary)]"
        min="1"
        max="20"
        step="1"
        aria-labelledby="results-label results-value"
      >
      <span id="results-value" class="font-bold text-[var(--color-primary)] min-w-8 text-center"></span>
    </div>
  </div>

  <!-- Submit Button -->
  <button
    id="search-submit"
    class="btn btn-primary w-full mt-4 bg-gradient-to-r from-[var(--color-primary-dark)] to-[var(--color-primary-darker)] text-white border-none rounded-xl py-3 px-4 text-sm font-semibold cursor-pointer transition-all duration-200 inline-flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed shadow-md hover:shadow-lg hover:-translate-y-0.5"
    type="submit"
  >
    <span id="search-btn-text">Cerca</span>
    <span id="loading-spinner" class="hidden">
      <svg
        aria-hidden="true"
        class="spinner animate-spin"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M21 12a9 9 0 1 1-6.219-8.56" stroke-linecap="round"></path>
      </svg>
      <span id="loading-text"></span>
    </span>
  </button>
  <hr class="search-divider border-t border-[var(--border-color)] mt-4 mb-4" aria-hidden="true">
</form>
