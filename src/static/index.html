<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Find nearby gas stations and compare fuel prices in Italy. Search by city, radius, and fuel type."
    >
    <title>Gas Station App - Find Nearby Fuel Stations</title>
    <link rel="icon" href="/favicon.png" type="image/x-icon">
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Design System -->
    <!-- i18next CDN -->
    <script defer src="https://unpkg.com/i18next@23.16.8/dist/umd/i18next.min.js"></script>
    <script defer src="https://unpkg.com/i18next-http-backend@2.7.1/i18nextHttpBackend.min.js"></script>
    <!-- App Scripts -->
    <script defer src="/static/js/i18n.js"></script>
    <script defer src="/static/js/app.config.js"></script>
    <script defer src="/static/js/app.storage.js"></script>
    <script defer src="/static/js/app.map.js"></script>
    <script type="module" defer src="/static/js/app.ui.js"></script>
    <script type="module" defer src="/static/js/app.ui.helpers.js"></script>
    <script type="module" defer src="/static/js/app.ui.csv.js"></script>
    <script type="module" defer src="/static/js/app.ui.dom.js"></script>
    <script type="module" defer src="/static/js/app.ui.interactions.js"></script>
    <script defer src="/static/js/app.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/styles.split.css">
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: "#f97316",
              hover: "#ea580c",
              light: "#fed7aa",
              dark: "#c2410c",
            },
            benzina: {
              DEFAULT: "#ea580c",
              light: "#fb923c",
            },
            gasolio: {
              DEFAULT: "#475569",
              light: "#94a3b8",
            },
            gpl: {
              DEFAULT: "#dc2626",
              light: "#f87171",
            },
            metano: {
              DEFAULT: "#0369a1",
              light: "#38bdf8",
            },
          },
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"],
            mono: ["JetBrains Mono", "Fira Code", "monospace"],
          },
          borderRadius: {
            sm: "8px",
            md: "12px",
            lg: "16px",
            xl: "24px",
          },
          boxShadow: {
            sm: "0 1px 2px rgba(28, 25, 23, 0.05)",
            md: "0 4px 6px -1px rgba(28, 25, 23, 0.08), 0 2px 4px -2px rgba(28, 25, 23, 0.05)",
            lg: "0 10px 15px -3px rgba(28, 25, 23, 0.08), 0 4px 6px -4px rgba(28, 25, 23, 0.05)",
            xl: "0 20px 25px -5px rgba(28, 25, 23, 0.1), 0 8px 10px -6px rgba(28, 25, 23, 0.05)",
            card: "0 4px 12px rgba(249, 115, 22, 0.08)",
          },
          animation: {
            shimmer: "shimmer 1.5s infinite",
            spin: "spin 1s linear infinite",
            "pulse-badge": "pulse-badge 2s ease-in-out infinite",
            "loading-pulse": "loading-pulse 1.5s ease-in-out infinite",
          },
          keyframes: {
            shimmer: {
              "0%": { backgroundPosition: "200% 0" },
              "100%": { backgroundPosition: "-200% 0" },
            },
            "pulse-badge": {
              "0%, 100%": { boxShadow: "0 0 0 0 rgba(249, 115, 22, 0.6)" },
              "50%": { boxShadow: "0 0 0 8px rgba(249, 115, 22, 0)" },
            },
            "loading-pulse": {
              "0%, 100%": { opacity: "1" },
              "50%": { opacity: "0.6" },
            },
          },
        },
      },
    };
    </script>
    <!-- Canonical URL -->
    <link rel="canonical" href="https://yourdomain.com/">
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Gas Station Finder",
      "description": "Find nearby gas stations and compare fuel prices in Italy",
      "applicationCategory": "Utilities",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      }
    }
    </script>
  </head>

  <body class="bg-[var(--bg-primary)] text-[var(--text-primary)] min-h-screen font-sans transition-colors duration-250">
    <!-- Skip links for keyboard navigation -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <a href="#search-container" class="skip-link">Skip to search</a>

    <!-- Status messages for screen readers -->
    <div aria-live="polite" aria-atomic="true" id="status-messages" class="sr-only"></div>
    <!-- Custom Loading Bar -->
    <div
      id="loading-bar"
      class="loading-bar fixed top-0 left-0 w-full h-0.5 bg-[var(--bg-surface)] z-[10000] opacity-0 transition-opacity duration-150"
      role="progressbar"
      aria-label="Loading"
      aria-hidden="true"
    >
      <div
        class="loading-bar-progress h-full w-0 bg-gradient-to-r from-[var(--color-primary)] to-[var(--color-primary-light)] shadow-[0_0_10px_var(--color-primary)]"
      ></div>
    </div>
    <header
      id="header-container"
      class="sticky top-0 z-[100] p-4 lg:p-6 bg-[var(--glass-bg)] backdrop-blur-[20px] border-b border-[var(--glass-border)]"
    >
      <div class="header-content max-w-[1600px] mx-auto flex items-center justify-between gap-6 flex-wrap"></div>
    </header>
    <main id="main-content" class="max-w-[1600px] mx-auto p-4 lg:p-6">
      <h1 class="sr-only">Gas Station Finder Application</h1>
      <div class="main-layout flex flex-col gap-8 lg:grid lg:grid-cols-[1fr_4px_1fr] lg:gap-0 lg:items-start">
        <!-- Left Column: Search + Results -->
        <div class="search-column flex flex-col" id="search-column">
          <search id="search-container" aria-label="Gas station search"></search>
          <section id="results-container" aria-label="Search results"></section>
        </div>

        <!-- Resizer -->
        <!-- biome-ignore lint/a11y/useSemanticElements: focusable window splitter is the correct ARIA pattern; <hr> cannot be interactive -->
        <div
          class="resizer hidden lg:block w-1 h-[calc(100vh-120px)] cursor-col-resize transition-all duration-150 rounded-full sticky top-[100px] z-10 hover:w-1.5"
          id="layout-resizer"
          role="separator"
          aria-orientation="vertical"
          aria-valuenow="50"
          aria-valuemin="10"
          aria-valuemax="90"
          tabindex="0"
        ></div>

        <!-- Right Column: Map -->
        <div id="map-column" class="lg:sticky lg:top-[100px] lg:h-[calc(100vh-120px)] lg:pl-4">
          <section id="map-container" aria-label="Map view" class="h-full"></section>
        </div>
      </div>
    </main>
    <!-- CSV Update Startup Popup -->
    <div
      id="csv-update-popup"
      class="hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="csv-popup-title"
      aria-describedby="csv-popup-body"
    >
      <div class="csv-popup-dialog">
        <div class="csv-popup-header">
          <div class="csv-popup-icon" aria-hidden="true">
            <svg
              aria-hidden="true"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
          </div>
          <span id="csv-popup-title" class="csv-popup-title" data-i18n="update_csv_popup_title"
            >Data Update Required</span
          >
        </div>
        <p id="csv-popup-body" class="csv-popup-body" data-i18n="update_csv_popup_body">
          Fuel price data is missing or outdated. Click the button below to fetch the latest data.
        </p>
        <div id="csv-popup-status" class="csv-popup-status" aria-live="polite" aria-atomic="true"></div>
        <button id="csv-popup-btn" type="button" class="csv-popup-btn" data-i18n="update_csv_popup_btn">
          Update data
        </button>
      </div>
    </div>
    <script>
    document.addEventListener("DOMContentLoaded", () => {
      window.initApp();
    });
    </script>
  </body>
</html>
